<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bananagrams</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Hand tiles floating at top -->
  <div class="hand-bar" id="hand-bar"></div>

  <!-- Game grid centered on page -->
  <div class="game-area">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Branding bottom center -->
  <div class="branding">BANANAGRAMS</div>

  <!-- Info panel bottom right -->
  <div class="info-panel">
    <div class="info-row">
      <span class="info-label">Tiles left in bag</span>
      <span class="info-val" id="bag-count">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Hand size</span>
      <span class="info-val" id="hand-count">—</span>
    </div>
    <div class="info-divider"></div>
    <div class="info-section-title">Words on board</div>
    <div id="words-area" class="words-area">—</div>
    <div class="info-divider"></div>
    <div class="info-section-title">Last action</div>
    <div id="last-action" class="last-action-text">—</div>
  </div>

  <!-- Win overlay -->
  <div id="win-banner" class="win-banner hidden">
    🎉 You Win! All tiles placed and all words valid.
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
